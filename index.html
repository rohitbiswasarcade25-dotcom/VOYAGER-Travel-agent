<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>VOYAGER</title>

<link rel="stylesheet" href="style.css">

<!-- Leaflet Map -->
<link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

</head>

<body>

<!-- NAVBAR -->
<nav class="navbar">
    <div class="logo">VOYA<span>GER</span></div>

    <div class="nav-links">
        <button class="active" id="plannerTab">Planner</button>
        <button id="assistantTab">Assistant</button>
    </div>

    <div class="profile">Traveler</div>
</nav>

<!-- MAIN -->
<div id="plannerSection">
<div class="container">

    <!-- LEFT PANEL -->
    <div class="card">
        <h2>✈ Plan Your Trip</h2>

        <form class="trip-form">

            <label>Destination</label>
            <input id="destination" type="text" placeholder="e.g. Paris" required>

            <label>Duration</label>
            <div class="range-box">
                <input id="rangeInput" type="range" min="1" max="10" value="3">
                <span id="durationText">3 Days</span>
            </div>

            <label>Budget</label>
            <div class="buttons">
                <button type="button">Budget</button>
                <button type="button" class="active">Moderate</button>
                <button type="button">Luxury</button>
            </div>

            <label>Interests</label>
            <textarea id="interests" placeholder="Food, nature..."></textarea>

            <button type="submit" class="generate">Generate ✨</button>
        </form>
    </div>

    <!-- RIGHT PANEL -->
    <div class="preview">

        <div id="status" class="status"></div>

        <div class="box">
            <div id="map"></div>
            <div id="output">
                <h3>Your itinerary will appear here ✈️</h3>
            </div>
        </div>

    </div>

</div>
</div>

<!-- ASSISTANT -->
<div id="assistantSection">

    <div class="chat-container">
        <div id="chatBox" class="chat-box"></div>

        <div class="chat-input">
            <input id="chatInput" placeholder="Ask travel questions...">
            <button id="sendBtn">Send</button>
        </div>
    </div>

</div>

<script src="index.js"></script>
</body>
</html>
